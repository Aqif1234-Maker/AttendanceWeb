{% extends 'base.html' %}
{% set page_class = 'page-animated-bg' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 auth-card">
    <div class="card sa-card glass-strong">
      <div class="card-body">
        <h3 class="mb-4 text-success">Student Login</h3>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Roll Number</label>
            <input type="text" class="form-control" name="roll_number" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <button class="btn btn-success w-100" type="submit">Login</button>
        </form>
        <p class="text-muted mt-3 mb-0">No account? <a href="{{ url_for('auth.student_signup') }}">Sign up</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
