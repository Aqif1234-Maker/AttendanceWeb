{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 auth-card">
    <div class="card sa-card">
      <div class="card-body">
        <h3 class="mb-4 text-info">Teacher Sign Up</h3>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="full_name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" name="confirm_password" required>
          </div>
          <button class="btn btn-info w-100" type="submit">Create Account</button>
        </form>
        <p class="text-muted mt-3 mb-0">Already have an account? <a href="{{ url_for('auth.teacher_login') }}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
