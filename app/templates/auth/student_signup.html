{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6 auth-card">
    <div class="card sa-card">
      <div class="card-body">
        <h3 class="mb-4 text-success">Student Sign Up</h3>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="full_name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Roll Number</label>
            <input type="text" class="form-control" name="roll_number" required>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Class</label>
              <select class="form-select" name="class" required>
                {% for i in range(1, 13) %}
                  <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Section</label>
              <select class="form-select" name="section" required>
                {% for s in ['A','B','C','D'] %}
                  <option value="{{ s }}">{{ s }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Contact</label>
            <input type="text" class="form-control" name="contact">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" name="confirm_password" required>
          </div>
          <button class="btn btn-success w-100" type="submit">Submit Registration</button>
        </form>
        <p class="text-muted mt-3 mb-0">Already registered? <a href="{{ url_for('auth.student_login') }}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
