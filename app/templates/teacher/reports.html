{% extends 'base.html' %}
{% set page_title = 'Reports' %}

{% block content %}
<div class="card sa-card">
  <div class="card-body">
    <h4 class="mb-3">Attendance Reports</h4>
    <div class="row g-2 align-items-end">
      <div class="col-md-3">
        <label class="form-label">Student Name</label>
        <input type="text" class="form-control" id="filterName">
      </div>
      <div class="col-md-2">
        <label class="form-label">Class</label>
        <input type="text" class="form-control" id="filterClass">
      </div>
      <div class="col-md-2">
        <label class="form-label">Date From</label>
        <input type="date" class="form-control" id="filterFrom">
      </div>
      <div class="col-md-2">
        <label class="form-label">Date To</label>
        <input type="date" class="form-control" id="filterTo">
      </div>
      <div class="col-md-3 d-flex gap-2">
        <button class="btn btn-info w-100" id="generateReport">Generate</button>
        <button class="btn btn-outline-success w-100" id="exportReport">Export Excel</button>
      </div>
    </div>

    <div class="table-responsive mt-4">
      <table class="table table-dark table-hover">
        <thead>
          <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Class</th>
            <th>Section</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="reportTable"></tbody>
      </table>
    </div>

    <div class="mt-4">
      <canvas id="reportChart" height="160"></canvas>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let reportChartInstance = null;

  function buildQuery() {
    const params = new URLSearchParams({
      name: document.getElementById('filterName').value.trim(),
      class: document.getElementById('filterClass').value.trim(),
      date_from: document.getElementById('filterFrom').value,
      date_to: document.getElementById('filterTo').value
    });
    return params.toString();
  }

  function renderReportChart(data) {
    const ctx = document.getElementById('reportChart');
    if (!ctx) return;
    if (reportChartInstance) {
      reportChartInstance.destroy();
    }
    const styles = getComputedStyle(document.body);
    const textSecondary = styles.getPropertyValue('--text-secondary').trim() || '#8899b4';
    const gridColor = styles.getPropertyValue('--border').trim() || 'rgba(255,255,255,0.06)';
    const blue = styles.getPropertyValue('--accent-blue').trim() || '#4f8ef7';
    const purple = styles.getPropertyValue('--accent-purple').trim() || '#a78bfa';
    const red = styles.getPropertyValue('--accent-red').trim() || '#ff4d6a';
    const yellow = styles.getPropertyValue('--accent-yellow').trim() || '#ffb830';
    const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 180);
    gradient.addColorStop(0, blue);
    gradient.addColorStop(1, purple);

    reportChartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Present', 'Absent', 'Late'],
        datasets: [{
          data: [data.present, data.absent, data.late],
          backgroundColor: [gradient, red, yellow],
          borderRadius: 8
        }]
      },
      options: {
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: { ticks: { color: textSecondary }, grid: { display: false } },
          y: { ticks: { color: textSecondary }, grid: { color: gridColor } }
        }
      }
    });
  }

  function loadReport() {
    fetch(`/api/report-data?${buildQuery()}`)
      .then(response => response.json())
      .then(rows => {
        const tbody = document.getElementById('reportTable');
        tbody.innerHTML = '';
        rows.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.name}</td>
            <td>${row.roll_number}</td>
            <td>${row.class}</td>
            <td>${row.section}</td>
            <td>${row.date}</td>
            <td><span class="status-badge status-${row.status.toLowerCase()}">${row.status}</span></td>
          `;
          tbody.appendChild(tr);
        });
      });

    fetch(`/api/report-chart?${buildQuery()}`)
      .then(response => response.json())
      .then(data => {
        renderReportChart(data);
      });
  }

  document.getElementById('generateReport').addEventListener('click', loadReport);
  document.getElementById('exportReport').addEventListener('click', () => {
    window.location.href = `/teacher/reports/export?${buildQuery()}`;
  });
</script>
{% endblock %}
